<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate VIP Roulette — Golden Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root {
  --gold: #d4af37;
  --red: #c0392b;
  --black: #2c3e50;
  --green: #27ae60;
  --bg-dark: #0b0704;
  --panel: #140e09;
  --wheel-size: 350px;
  --chip-size: 30px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
  background: radial-gradient(circle at top,#1c130a,#080503 70%);
  color:#eae6dc;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

/* Vault Doors */
.doors{
  position:fixed;inset:0;z-index:10;display:flex;pointer-events:none;
}
.door{
  width:50%;height:100%;
  background:linear-gradient(180deg,#1a120a,#090603);
  border-right:1px solid rgba(212,175,55,0.4);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
  transform:translateX(0);
  transition: transform 2.6s cubic-bezier(.77,0,.18,1);
}
.door.right{border-right:none;border-left:1px solid rgba(212,175,55,0.4);}
.doors.open .door.left{transform:translateX(-100%);}
.doors.open .door.right{transform:translateX(100%);}

/* Vault Content */
.vault{
  width:95%;max-width:750px;
  background:linear-gradient(180deg,#160f09,#0b0704);
  border:2px solid rgba(212,175,55,0.6);
  border-radius:20px;
  padding:30px;
  box-shadow:0 0 60px rgba(212,175,55,0.3), inset 0 0 30px rgba(0,0,0,0.6);
  text-align:center;
  opacity:0;transform:scale(0.96);transition:opacity 1.2s ease, transform 1.2s ease;
}
.vault.visible{opacity:1;transform:scale(1);}

h1{color:var(--gold);margin-bottom:15px;}
.balance{font-size:1.5rem;color:var(--gold);margin-bottom:20px;}

.wheel-container{
  position:relative;
  width:var(--wheel-size);height:var(--wheel-size);
  margin:0 auto;
}
.wheel{
  width:100%;height:100%;border-radius:50%;
  border:6px solid var(--gold);
  position:relative;
  overflow:hidden;
  box-shadow:0 0 40px rgba(212,175,55,0.4) inset,0 0 20px rgba(0,0,0,0.5);
  transition: transform 4s cubic-bezier(.77,0,.18,1);
}
.wheel div{
  position:absolute;width:100%;height:50%;
  display:flex;align-items:flex-start;justify-content:center;
  font-size:0.65rem;font-weight:bold;color:#fff;
  transform-origin:50% 100%;
}
.wheel div span{
  transform:translateY(-50%) rotate(0deg);
}

/* Ball */
.ball{
  width:15px;height:15px;background:#fff;
  border-radius:50%;position:absolute;top:10px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 12px #fff,0 0 8px #f0f0f0 inset;
  z-index:20;
}

/* Bets */
.bets{
  margin-top:20px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
}
.bets button{
  padding:10px 18px;border-radius:6px;border:1px solid var(--gold);
  background:transparent;color:var(--gold);cursor:pointer;transition:0.3s;
}
.bets button:hover{background:rgba(212,175,55,0.1);box-shadow:0 0 12px rgba(212,175,55,0.3);}
.message{margin-top:15px;height:30px;font-size:1.1rem;color:var(--gold);}
.exit-btn{margin-top:20px;padding:10px 20px;border:1px solid var(--gold);border-radius:8px;background:transparent;color:var(--gold);cursor:pointer;}
.exit-btn:hover{background:rgba(212,175,55,0.2);box-shadow:0 0 12px rgba(212,175,55,0.5);}
.chip{
  width:var(--chip-size);height:var(--chip-size);
  border-radius:50%;position:absolute;z-index:20;
  background:radial-gradient(circle,#f9f9f9,#ccc);
  border:2px solid #333;
  animation:chipDrop 0.6s ease forwards;
}
@keyframes chipDrop{
  0%{transform:translateY(-50px) scale(0);}
  100%{transform:translateY(0) scale(1);}
}
/* Highlight winning number */
.winning{
  box-shadow:0 0 15px #fff inset, 0 0 20px var(--gold);
  border-radius:50%;
  transform: scale(1.3);
  transition: transform 0.5s ease, box-shadow 0.5s ease;
}
</style>
</head>
<body>

<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<div class="vault" id="vault">
  <h1>Ultra VIP Roulette — Golden Vault</h1>
  <div class="balance" id="balance">$1000</div>

  <div class="wheel-container">
    <div class="wheel" id="wheel"></div>
    <div class="ball" id="ball"></div>
  </div>

  <div class="bets">
    <button onclick="placeBet('red')">Red</button>
    <button onclick="placeBet('black')">Black</button>
    <button onclick="placeBet('green')">0</button>
    <button onclick="placeBet('even')">Even</button>
    <button onclick="placeBet('odd')">Odd</button>
    <button onclick="placeBet('low')">1-18</button>
    <button onclick="placeBet('high')">19-36</button>
  </div>

  <div class="message" id="message"></div>
  <button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<script>
const doors = document.getElementById('doors');
const vault = document.getElementById('vault');
const wheel = document.getElementById('wheel');
const ball = document.getElementById('ball');
const balanceEl = document.getElementById('balance');
const messageEl = document.getElementById('message');

let balance = parseInt(localStorage.getItem("goldenVaultBalance")) || 1000;
balanceEl.textContent = "$" + balance;

let spinning=false;

// Vault animation
setTimeout(()=>doors.classList.add('open'),600);
setTimeout(()=>vault.classList.add('visible'),2000);

// Exit
function exitVault(){
  vault.classList.remove('visible');
  setTimeout(()=>doors.classList.remove('open'),400);
  setTimeout(()=>window.location.href="members.html",2600);
}

// Wheel numbers & colors
const wheelNumbers=[];
const redNumbers=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
for(let i=0;i<=36;i++) wheelNumbers.push(i);

wheel.innerHTML='';
wheelNumbers.forEach((n,i)=>{
  let div=document.createElement('div');
  div.style.transform=`rotate(${(i/37)*360}deg)`;
  let color=n===0?'green': redNumbers.includes(n)?'red':'black';
  div.innerHTML=`<span style="color:${color}">${n}</span>`;
  wheel.appendChild(div);
});

function getColor(n){
  if(n===0) return 'green';
  return redNumbers.includes(n)?'red':'black';
}

// Place bet
function placeBet(choice){
  if(spinning){messageEl.textContent="Wait for spin to finish"; return;}
  let betAmount=50;
  if(balance<betAmount){messageEl.textContent="Not enough balance"; return;}
  balance -= betAmount;
  balanceEl.textContent="$"+balance;
  spinning=true;
  messageEl.textContent="Spinning...";

  // Chip animation
  const chip=document.createElement('div');
  chip.className='chip';
  chip.style.left=50 + Math.random()*60 -30 + 'px';
  chip.style.top='-40px';
  vault.appendChild(chip);
  setTimeout(()=>vault.removeChild(chip),800);

  // Spin
  let spins=Math.random()*720+720;
  wheel.style.transition='transform 3s cubic-bezier(.77,0,.18,1)';
  wheel.style.transform=`rotate(${spins}deg)`;
  ball.style.transition='transform 3s ease-out';
  ball.style.transform=`rotate(${spins*3}deg) translateX(${wheel.offsetWidth/2 - 20}px) rotate(-${spins*3}deg)`;

  setTimeout(()=>{
    let finalAngle=spins%360;
    let winningIndex=Math.floor(finalAngle/360*37);
    let winningNumber=36-winningIndex;
    let color=getColor(winningNumber);

    // Highlight winning
    wheel.childNodes.forEach(n=>n.classList.remove('winning'));
    wheel.childNodes[winningIndex].classList.add('winning');

    let win=false;
    if(choice==='red' && color==='red') win=true;
    if(choice==='black' && color==='black') win=true;
    if(choice==='green' && color==='green') win=true;
    if(choice==='even' && winningNumber!==0 && winningNumber%2===0) win=true;
    if(choice==='odd' && winningNumber%2===1) win=true;
    if(choice==='low' && winningNumber>=1 && winningNumber<=18) win=true;
    if(choice==='high' && winningNumber>=19 && winningNumber<=36) win=true;

    let payout=(choice==='green')?17*betAmount:2*betAmount;
    if(win){balance+=payout; messageEl.textContent=`${winningNumber} ${color}! You win $${payout}`;}
    else messageEl.textContent=`${winningNumber} ${color}! You lose`;
    balanceEl.textContent="$"+balance;
    localStorage.setItem("goldenVaultBalance",balance);
    spinning=false;
  },3100);
}
</script>

</body>
</html>
