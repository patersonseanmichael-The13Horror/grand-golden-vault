<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Roulette — Golden Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root {
  --gold: #d4af37;
  --text-light: #eae6dc;
  --bg-dark: #0b0704;
  --green-felt: #0b3d0b;
  --wheel-size: 400px;
  --ball-size: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
  <body class="vault-bg roulette-page">
  background: url('grand-golden-vault/images/roulette.jpg') no-repeat center center fixed;
  background-size: cover;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Vignette overlay to highlight the wheel */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.75) 100%);
  pointer-events:none;
  z-index:1;
}

/* Vignette overlay to highlight the wheel */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.75) 100%);
  pointer-events:none;
  z-index:1;
}

/* Vault Doors */
.doors{
  position:fixed;inset:0;z-index:10;display:flex;pointer-events:none;
}
.door{
  width:50%;height:100%;
  background:linear-gradient(180deg,#1a120a,#090603);
  border-right:1px solid rgba(212,175,55,0.4);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
  transform:translateX(0);
  transition: transform 2.6s cubic-bezier(.77,0,.18,1);
  z-index:11;
}
.door.right{border-right:none;border-left:1px solid rgba(212,175,55,0.4);}
.doors.open .door.left{transform:translateX(-100%);}
.doors.open .door.right{transform:translateX(100%);}

/* Vault Content */
.vault{
  width:95%; max-width:1200px;
  max-height:90vh;
  overflow-y:auto;
  background:linear-gradient(180deg,rgba(22,15,9,0.9),rgba(11,7,4,0.9));
  border:2px solid rgba(212,175,55,0.6);
  border-radius:20px;
  padding:30px;
  box-shadow:0 0 120px rgba(212,175,55,0.4), inset 0 0 40px rgba(0,0,0,0.6);
  text-align:center;
  opacity:0; transform:scale(0.96);
  transition:opacity 1.2s ease, transform 1.2s ease;
  position:relative;
  z-index:2;
}
.vault.visible{opacity:1;transform:scale(1);}
h1{color:var(--gold);margin-bottom:10px;}
.balance{font-size:1.5rem;color:var(--gold);margin-bottom:15px;}

/* Canvas roulette */
#canvas{
  display:block;
  margin:20px auto;
  border-radius:50%;
  box-shadow:0 0 30px rgba(212,175,55,0.5) inset,0 0 60px rgba(212,175,55,0.3);
  background: radial-gradient(circle at center, #222 0%, #111 70%);
  position:relative;
  z-index:2;
}

/* Table layout */
.table{
  margin:20px auto;
  display:flex;flex-wrap:wrap;justify-content:center;gap:4px;
  max-width:600px;
  position:relative;
  z-index:2;
}
.cell{
  width:50px;height:50px;display:flex;align-items:center;justify-content:center;
  font-weight:bold;border:1px solid #111;border-radius:6px;
  cursor:pointer;transition:0.3s;
}
.cell.red{background:#c40000;color:#fff;}
.cell.black{background:#000;color:#fff;}
.cell.green{background:#0f800f;color:#fff;}
.cell:hover{box-shadow:0 0 12px rgba(255,255,255,0.6);}
button{
  padding:10px 25px;
  border-radius:8px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
  transition:0.3s;
  margin:5px;
  position:relative;
  z-index:2;
}
button:hover{
  background:rgba(212,175,55,0.1);
  box-shadow:0 0 12px rgba(212,175,55,0.3);
}
.exit-btn{margin-top:20px;}
.message{margin-top:12px;height:24px;font-size:1.1rem;position:relative;z-index:2;}
</style>
</head>
<body>

<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<div class="vault" id="vault">
  <h1>VIP Roulette — Golden Vault</h1>
  <div class="balance" id="balance">$1000</div>

  <canvas id="canvas" width="500" height="500"></canvas>

  <div>
    <button id="spinBtn">Spin</button>
  </div>
  <div class="message" id="message"></div>

  <div class="table" id="table"></div>

  <button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<script>
// --------- Canvas & Wheel Setup ---------
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const centerX = canvas.width/2;
const centerY = canvas.height/2;
const radius = 200;
const segments = ['1','2','3','4','5','6','7','8'];
const colors = ['#d4af37','#c0c0c0','#e67e22','#2ecc71','#3498db','#9b59b6','#1abc9c','#e74c3c'];

let angle = 0;
let spinning = false;

// Ball properties
let ballAngle = 0;
let ballSpeed = 0;
let ballRadius = 14;

// Create table layout
const table = document.getElementById('table');
segments.forEach((num,i)=>{
  const cell = document.createElement('div');
  cell.className = i%2===0 ? 'cell red':'cell.black';
  cell.innerText = num;
  table.appendChild(cell);
});

// --------- Draw Wheel ---------
function drawWheel(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const segAngle = (2*Math.PI)/segments.length;

    for(let i=0;i<segments.length;i++){
        ctx.beginPath();
        ctx.moveTo(centerX,centerY);
        ctx.arc(centerX,centerY,radius, angle+i*segAngle, angle+(i+1)*segAngle);

        const grad = ctx.createRadialGradient(centerX,centerY,radius*0.05, centerX,centerY,radius);
        grad.addColorStop(0,'#fff');
        grad.addColorStop(0.5, colors[i%colors.length]);
        grad.addColorStop(1,'#000');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(centerX,centerY);
        ctx.rotate(angle+(i+0.5)*segAngle);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";
        ctx.shadowColor = "#ffd700";
        ctx.shadowBlur = 12;
        ctx.font = "20px Arial Black";
        ctx.fillText(segments[i], radius-20,10);
        ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(centerX,centerY,20,0,2*Math.PI);
    ctx.fillStyle = "#555";
    ctx.fill();
    ctx.strokeStyle = "#222";
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(centerX, centerY-radius-10);
    ctx.lineTo(centerX-15, centerY-radius+20);
    ctx.lineTo(centerX+15, centerY-radius+20);
    ctx.closePath();
    ctx.fillStyle = "red";
    ctx.fill();

    const ballX = centerX + Math.cos(ballAngle)*(radius-25);
    const ballY = centerY + Math.sin(ballAngle)*(radius-25);
    ctx.beginPath();
    ctx.arc(ballX,ballY,ballRadius,0,2*Math.PI);
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "#fff";
    ctx.shadowBlur = 14;
    ctx.fill();
}

// --------- Spin Function with Ball Bounce ---------
function spinWheel(){
    if(spinning) return;
    spinning = true;

    let spinVelocity = Math.random()*0.35 + 0.25;
    let spinDecay = 0.993;
    ballSpeed = -spinVelocity*1.7;
    ballAngle = angle;

    let bounceAmplitude = Math.random()*0.04 + 0.03;
    let bounceDirection = 1;

    function animate(){
        spinVelocity *= spinDecay;
        angle += spinVelocity;

        ballSpeed *= 0.995;
        ballAngle += ballSpeed + Math.sin(Date.now()*0.005)*bounceAmplitude*bounceDirection;

        drawWheel();

        if(Math.abs(spinVelocity) > 0.002){
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            const segAngle = (2*Math.PI)/segments.length;
            const index = Math.floor(((2*Math.PI - angle%(2*Math.PI))/segAngle))%segments.length;
            document.getElementById('message').innerText = "The ball landed on: " + segments[index];
        }
    }
    animate();
}

// --------- Initial Draw & Event Listeners ---------
drawWheel();
document.getElementById('spinBtn').addEventListener('click', spinWheel);

window.addEventListener('load',()=>{
    document.getElementById('doors').classList.add('open');
    document.getElementById('vault').classList.add('visible');
});

function exitVault(){
    document.getElementById('doors').classList.remove('open');
    document.getElementById('vault').classList.remove('visible');
    setTimeout(()=>window.close(),1500);
}
</script>
</body>
</html>
