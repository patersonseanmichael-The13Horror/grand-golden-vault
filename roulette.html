<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Roulette — Golden Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root {
  --gold: #d4af37;
  --text-light: #eae6dc;
  --bg-dark: #0b0704;
  --green-felt: #0b3d0b;
  --wheel-size: 400px;
  --ball-size: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
  <body class="vault-bg roulette-page">
  background: url('grand-golden-vault/images/roulette.jpg') no-repeat center center fixed;
  background-size: cover;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Vignette overlay to highlight the wheel */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.75) 100%);
  pointer-events:none;
  z-index:1;
}

/* Vignette overlay to highlight the wheel */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.75) 100%);
  pointer-events:none;
  z-index:1;
}

/* Vault Doors */
.doors{
  position:fixed;inset:0;z-index:10;display:flex;pointer-events:none;
}
.door{
  width:50%;height:100%;
  background:linear-gradient(180deg,#1a120a,#090603);
  border-right:1px solid rgba(212,175,55,0.4);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
  transform:translateX(0);
  transition: transform 2.6s cubic-bezier(.77,0,.18,1);
  z-index:11;
}
.door.right{border-right:none;border-left:1px solid rgba(212,175,55,0.4);}
.doors.open .door.left{transform:translateX(-100%);}
.doors.open .door.right{transform:translateX(100%);}

/* Vault Content */
.vault{
  width:95%; max-width:1200px;
  max-height:90vh;
  overflow-y:auto;
  background:linear-gradient(180deg,rgba(22,15,9,0.9),rgba(11,7,4,0.9));
  border:2px solid rgba(212,175,55,0.6);
  border-radius:20px;
  padding:30px;
  box-shadow:0 0 120px rgba(212,175,55,0.4), inset 0 0 40px rgba(0,0,0,0.6);
  text-align:center;
  opacity:0; transform:scale(0.96);
  transition:opacity 1.2s ease, transform 1.2s ease;
  position:relative;
  z-index:2;
}
.vault.visible{opacity:1;transform:scale(1);}
h1{color:var(--gold);margin-bottom:10px;}
.balance{font-size:1.5rem;color:var(--gold);margin-bottom:15px;}

/* Canvas roulette */
#canvas{
  display:block;
  margin:20px auto;
  border-radius:50%;
  box-shadow:0 0 30px rgba(212,175,55,0.5) inset,0 0 60px rgba(212,175,55,0.3);
  background: radial-gradient(circle at center, #222 0%, #111 70%);
  position:relative;
  z-index:2;
}

/* Table layout */
.table{
  margin:20px auto;
  display:flex;flex-wrap:wrap;justify-content:center;gap:4px;
  max-width:600px;
  position:relative;
  z-index:2;
}
.cell{
  width:50px;height:50px;display:flex;align-items:center;justify-content:center;
  font-weight:bold;border:1px solid #111;border-radius:6px;
  cursor:pointer;transition:0.3s;
}
.cell.red{background:#c40000;color:#fff;}
.cell.black{background:#000;color:#fff;}
.cell.green{background:#0f800f;color:#fff;}
.cell:hover{box-shadow:0 0 12px rgba(255,255,255,0.6);}
button{
  padding:10px 25px;
  border-radius:8px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
  transition:0.3s;
  margin:5px;
  position:relative;
  z-index:2;
}
button:hover{
  background:rgba(212,175,55,0.1);
  box-shadow:0 0 12px rgba(212,175,55,0.3);
}
.exit-btn{margin-top:20px;}
.message{margin-top:12px;height:24px;font-size:1.1rem;position:relative;z-index:2;}
</style>
</head>
<body>

<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<div class="vault" id="vault">
  <h1>VIP Roulette — Golden Vault</h1>
  <div class="balance" id="balance">$1000</div>

  <canvas id="canvas" width="500" height="500"></canvas>

  <div>
    <button id="spinBtn">Spin</button>
  </div>
  <div class="message" id="message"></div>

  <div class="table" id="table"></div>

  <button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<script src="core/vaultEngine.js"></script>
<script>
"use strict";

// ----------------------------
// INIT VAULT ENGINE
// ----------------------------

VaultEngine.init();

const balanceEl = document.getElementById("balance");
const messageEl = document.getElementById("message");
const spinBtn = document.getElementById("spinBtn");
const table = document.getElementById("table");

function updateBalanceUI() {
  balanceEl.innerText =
    "GOLD: " + VaultEngine.getBalance().toFixed(2);
}

updateBalanceUI();

// ----------------------------
// ROULETTE CONFIG
// ----------------------------

const BET_AMOUNT = 100;
let selectedNumber = null;
let spinning = false;

// European wheel
const segments = [
  "0","32","15","19","4","21","2","25","17","34","6","27",
  "13","36","11","30","8","23","10","5","24","16","33",
  "1","20","14","31","9","22","18","29","7","28","12","35","3","26"
];

// ----------------------------
// SECURE RNG
// ----------------------------

function secureRandomIndex() {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % segments.length;
}

// ----------------------------
// BUILD TABLE
// ----------------------------

segments.forEach(num => {
  const cell = document.createElement("div");

  cell.className = "cell";
  cell.innerText = num;

  if (num === "0") cell.classList.add("green");
  else if (parseInt(num) % 2 === 0) cell.classList.add("black");
  else cell.classList.add("red");

  cell.addEventListener("click", () => {
    if (spinning) return;

    selectedNumber = num;
    document.querySelectorAll(".cell")
      .forEach(c => c.style.outline = "none");

    cell.style.outline = "3px solid gold";
  });

  table.appendChild(cell);
});

// ----------------------------
// CANVAS WHEEL
// ----------------------------

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
const radius = 200;

let angle = 0;

function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const segAngle = (2 * Math.PI) / segments.length;

  for (let i = 0; i < segments.length; i++) {
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(
      centerX,
      centerY,
      radius,
      angle + i * segAngle,
      angle + (i + 1) * segAngle
    );

    ctx.fillStyle =
      i % 2 === 0 ? "#b8860b" : "#8b0000";

    ctx.fill();
    ctx.strokeStyle = "#111";
    ctx.stroke();

    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(angle + (i + 0.5) * segAngle);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText(segments[i], radius - 20, 5);
    ctx.restore();
  }
}

drawWheel();

// ----------------------------
// SPIN LOGIC
// ----------------------------

spinBtn.addEventListener("click", () => {
  if (spinning) return;

  if (!selectedNumber) {
    messageEl.innerText = "Select a number.";
    return;
  }

  if (VaultEngine.getBalance() < BET_AMOUNT) {
    messageEl.innerText = "Insufficient GOLD.";
    return;
  }

  try {
    VaultEngine.debit(BET_AMOUNT, "roulette-bet");
  } catch (err) {
    messageEl.innerText = err.message;
    return;
  }

  updateBalanceUI();

  spinning = true;
  spinBtn.disabled = true;
  messageEl.innerText = "Spinning...";

  const winningIndex = secureRandomIndex();
  const winningNumber = segments[winningIndex];

  let velocity = 0.4;
  const decay = 0.992;

  function animate() {
    velocity *= decay;
    angle += velocity;
    drawWheel();

    if (velocity > 0.002) {
      requestAnimationFrame(animate);
    } else {
      finishSpin(winningNumber);
    }
  }

  animate();
});

// ----------------------------
// RESOLVE BET
// ----------------------------

function finishSpin(winningNumber) {

  let winAmount = 0;

  if (winningNumber === selectedNumber) {
    winAmount = BET_AMOUNT * 36;
    VaultEngine.credit(winAmount, "roulette-win");
    messageEl.innerText =
      `Ball: ${winningNumber} — WIN +${winAmount} GOLD`;
  } else {
    messageEl.innerText =
      `Ball: ${winningNumber} — No Win`;
  }

  updateBalanceUI();

  spinning = false;
  spinBtn.disabled = false;
}

</script>
</body>
</html>
