<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette — Golden Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="global.css">
<style>
/* Page-specific styles */
.vault {
  background: radial-gradient(circle at center,#1c130a,#080503 80%);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(212,175,55,0.5);
  width: 95%;
  max-width: 900px;
  text-align: center;
  box-shadow: 0 0 50px rgba(212,175,55,0.5);
  position: relative;
}

h1 { color: var(--gold); margin-bottom: 20px; }

.roulette-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.roulette-wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 12px solid var(--gold);
  background: radial-gradient(circle, #000 60%, #222 100%);
  position: relative;
  box-shadow: inset 0 0 20px rgba(255,215,0,0.5);
}

.ball {
  width: 15px;
  height: 15px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
}

.table {
  background: var(--panel);
  padding: 20px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: repeat(12, 40px);
  gap: 4px;
  justify-content: center;
  box-shadow: 0 0 20px rgba(212,175,55,0.3);
}

.cell {
  width: 40px;
  height: 40px;
  background: #222;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
}

.cell.red { background: #b71c1c; }
.cell.black { background: #111; }
.cell.green { background: #0a5; }

.bet-info {
  margin-top: 15px;
  color: var(--gold);
  font-size: 1.2rem;
}

button#spinBtn {
  margin-top: 15px;
  padding: 12px 24px;
  font-size: 1rem;
}
</style>
</head>
<body>
<div class="vault">
  <h1>Roulette — Golden Vault</h1>
  <div class="roulette-container">
    <div class="roulette-wheel" id="wheel">
      <div class="ball" id="ball"></div>
    </div>
    <div class="table" id="rouletteTable"></div>
  </div>
  <div class="bet-info" id="betInfo">Balance: $1000 | Current Bet: $0</div>
  <button id="spinBtn">Spin</button>
</div>
<script src="animationController.js"></script>
<script src="roulette.js"></script>
</body>
</html>
