<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Vegas Roulette — Golden Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root {
  --gold: #d4af37;
  --text-light: #eae6dc;
  --bg-dark: #0b0704;
  --table-green: #0a3b0a;
  --wheel-size: 300px;
  --chip-size: 24px;
  --ball-size: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
  background: radial-gradient(circle at top,#1c130a,#080503 70%);
  color: var(--text-light);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Vault Doors */
.doors{
  position:fixed;inset:0;z-index:10;display:flex;pointer-events:none;
}
.door{
  width:50%;height:100%;
  background:linear-gradient(180deg,#1a120a,#090603);
  border-right:1px solid rgba(212,175,55,0.4);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
  transform:translateX(0);
  transition: transform 2.6s cubic-bezier(.77,0,.18,1);
}
.door.right{border-right:none;border-left:1px solid rgba(212,175,55,0.4);}
.doors.open .door.left{transform:translateX(-100%);}
.doors.open .door.right{transform:translateX(100%);}

/* Vault Content */
.vault{
  width:95%;max-width:600px;
  background:linear-gradient(180deg,#160f09,#0b0704);
  border:1px solid rgba(212,175,55,0.5);
  border-radius:18px;
  padding:20px 30px;
  box-shadow:0 0 60px rgba(212,175,55,0.18),inset 0 0 30px rgba(0,0,0,0.6);
  text-align:center;
  opacity:0;transform:scale(0.96);transition:opacity 1.2s ease, transform 1.2s ease;
}
.vault.visible{opacity:1;transform:scale(1);}
h1{color:var(--gold);margin-bottom:10px;}
.balance{font-size:1.5rem;color:var(--gold);margin-bottom:15px;}

.table-container{
  position:relative;
  width:100%;
  height: var(--wheel-size);
  margin:20px auto;
}
.wheel{
  width:var(--wheel-size);
  height:var(--wheel-size);
  border-radius:50%;
  border:6px solid var(--gold);
  position:relative;
  transform: rotate(0deg);
  transition: transform 3s cubic-bezier(.77,0,.18,1);
  box-shadow: 0 0 30px rgba(212,175,55,0.5) inset;
}
.wheel-number{
  position:absolute;
  width:50%;
  height:50%;
  top:50%;
  left:50%;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  font-size:0.75rem;
  font-weight:bold;
  color:#fff;
  transform-origin:0 0;
}
.wheel-number.red{color:#ff4c4c;}
.wheel-number.black{color:#000;}
.wheel-number.green{color:#00ff00;}

.ball{
  width: var(--ball-size);
  height: var(--ball-size);
  background: #fff;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%);
  box-shadow:0 0 8px #fff;
}

.bets{margin-top:15px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
button{padding:8px 14px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:0.3s;}
button:hover{background:rgba(212,175,55,0.1);box-shadow:0 0 12px rgba(212,175,55,0.3);}
.message{margin-top:12px;height:24px;}
.exit-btn{margin-top:20px;}

.chip{
  width: var(--chip-size);
  height: var(--chip-size);
  border-radius:50%;
  position:absolute;
  border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;
  color:#fff;
  pointer-events:none;
  box-shadow:0 0 4px #000;
}
</style>
</head>
<body>

<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<div class="vault" id="vault">
  <h1>Ultra Vegas Roulette — Golden Vault</h1>
  <div class="balance" id="balance">$1000</div>

  <div class="table-container">
    <div class="wheel" id="wheel"></div>
    <div class="ball" id="ball"></div>
  </div>

  <div class="bets">
    <button onclick="placeBet('red')">Red</button>
    <button onclick="placeBet('black')">Black</button>
    <button onclick="placeBet('green')">0</button>
  </div>

  <div class="message" id="message"></div>

  <button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<script>
// Elements
const doors = document.getElementById('doors');
const vault = document.getElementById('vault');
const wheel = document.getElementById('wheel');
const ball = document.getElementById('ball');
const balanceEl = document.getElementById('balance');
const messageEl = document.getElementById('message');

let balance = 1000;
balanceEl.textContent = "$"+balance;
let spinning=false;

// Vault open
setTimeout(()=>doors.classList.add('open'),600);
setTimeout(()=>vault.classList.add('visible'),2000);

// Exit
function exitVault(){
  vault.classList.remove('visible');
  setTimeout(()=>doors.classList.remove('open'),400);
  setTimeout(()=>window.location.href="members.html",2600);
}

// Wheel numbers and colors
const wheelNumbers = Array.from({length:37},(_,i)=>i);
const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
wheelNumbers.forEach((n,i)=>{
  const div=document.createElement('div');
  div.className='wheel-number '+(n===0?'green':redNumbers.includes(n)?'red':'black');
  div.textContent=n;
  const angle = (i/37)*360;
  div.style.transform = `rotate(${angle}deg) translateX(50%) rotate(-${angle}deg)`;
  wheel.appendChild(div);
});

// Sounds
const soundChip=new Audio('https://cdn.jsdelivr.net/gh/seanpaterson/goldenvault-assets/chip_place.mp3');
const soundSpin=new Audio('https://cdn.jsdelivr.net/gh/seanpaterson/goldenvault-assets/wheel_spin.mp3');
const soundWin=new Audio('https://cdn.jsdelivr.net/gh/seanpaterson/goldenvault-assets/win_ping.mp3');

function placeBet(color){
  if(spinning){messageEl.textContent="Wait for spin"; return;}
  let betAmount=50;
  if(balance<betAmount){messageEl.textContent="Not enough balance"; return;}
  balance -= betAmount;
  balanceEl.textContent="$"+balance;
  messageEl.textContent="Spinning...";
  spinning=true;

  soundSpin.currentTime=0; soundSpin.play();

  const spins = Math.floor(Math.random()*360)+720;
  wheel.style.transition='transform 4s cubic-bezier(.77,0,.18,1)';
  wheel.style.transform=`rotate(${spins}deg)`;

  let finalIndex = Math.floor(Math.random()*37);
  const winningNumber = finalIndex;
  const winningColor = winningNumber===0?'green':redNumbers.includes(winningNumber)?'red':'black';

  // Ball animation
  const spinDuration = 4000;
  const startTime = performance.now();
  function animateBall(time){
    const t=(time-startTime)/spinDuration;
    if(t>1){
      soundSpin.pause();
      soundWin.currentTime=0; soundWin.play();
      let payout = color===winningColor? betAmount*2 : 0;
      if(color===winningColor) balance+=payout;
      balanceEl.textContent="$"+balance;
      messageEl.textContent=`Winning: ${winningNumber} ${winningColor}! ${payout?`You win $${payout}`:"You lose"}`;
      spinning=false;
      ball.style.transform='translate(-50%,-50%)';
      return;
    }
    const angle = t*720 + (winningNumber/37)*360;
    ball.style.transform = `translate(-50%,-50%) rotate(${angle}deg) translateX(130px) rotate(-${angle}deg)`;
    requestAnimationFrame(animateBall);
  }
  requestAnimationFrame(animateBall);
}
</script>

</body>
</html>
