<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette — Golden Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="global.css">
<style>
/* ---- PAGE-SPECIFIC STYLES ---- */
.vault {
  background: radial-gradient(circle at center,#1c130a,#080503 80%);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(212,175,55,0.5);
  width: 95%;
  max-width: 900px;
  text-align: center;
  box-shadow: 0 0 50px rgba(212,175,55,0.5);
  position: relative;
}

h1 { color: var(--gold); margin-bottom: 20px; }

.roulette-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.roulette-wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 12px solid var(--gold);
  background: radial-gradient(circle, #000 60%, #222 100%);
  position: relative;
  box-shadow: inset 0 0 20px rgba(255,215,0,0.5);
}

.ball {
  width: 15px;
  height: 15px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
}

.table {
  background: var(--panel);
  padding: 20px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: repeat(12, 40px);
  gap: 4px;
  justify-content: center;
  box-shadow: 0 0 20px rgba(212,175,55,0.3);
}

.cell {
  width: 40px;
  height: 40px;
  background: #222;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
}

.cell.red { background: #b71c1c; }
.cell.black { background: #111; }
.cell.green { background: #0a5; }

.bet-info {
  margin-top: 15px;
  color: var(--gold);
  font-size: 1.2rem;
}

button#spinBtn {
  margin-top: 15px;
  padding: 12px 24px;
  font-size: 1rem;
}
</style>
</head>
<body>
<div class="vault">
  <h1>Roulette — Golden Vault</h1>
  <div class="roulette-container">
    <div class="roulette-wheel" id="wheel">
      <div class="ball" id="ball"></div>
    </div>
    <div class="table" id="rouletteTable"></div>
  </div>
  <div class="bet-info" id="betInfo">Balance: $1000 | Current Bet: $0</div>
  <button id="spinBtn">Spin</button>
</div>

<script>
// ---- CONFIG ----
const WALLET_KEY = "goldenVaultBalance";
let balance = parseInt(localStorage.getItem(WALLET_KEY)) || 1000;
let currentBet = 0;
const betInfo = document.getElementById("betInfo");
const tableEl = document.getElementById("rouletteTable");
const spinBtn = document.getElementById("spinBtn");
const wheel = document.getElementById("wheel");
const ball = document.getElementById("ball");

const numbers = [
  {num:0,color:"green"}, {num:32,color:"red"},{num:15,color:"black"},{num:19,color:"red"},
  {num:4,color:"black"},{num:21,color:"red"},{num:2,color:"black"},{num:25,color:"red"},
  {num:17,color:"black"},{num:34,color:"red"},{num:6,color:"black"},{num:27,color:"red"},
  {num:13,color:"black"},{num:36,color:"red"},{num:11,color:"black"},{num:30,color:"red"},
  {num:8,color:"black"},{num:23,color:"red"},{num:10,color:"black"},{num:5,color:"red"},
  {num:24,color:"black"},{num:16,color:"red"},{num:33,color:"black"},{num:1,color:"red"},
  {num:20,color:"black"},{num:14,color:"red"},{num:31,color:"black"},{num:9,color:"red"},
  {num:22,color:"black"},{num:18,color:"red"},{num:29,color:"black"},{num:7,color:"red"},
  {num:28,color:"black"},{num:12,color:"red"},{num:35,color:"black"},{num:3,color:"red"},
  {num:26,color:"black"}
];

// ---- CREATE TABLE CELLS ----
numbers.forEach(n=>{
  const cell = document.createElement("div");
  cell.classList.add("cell");
  cell.classList.add(n.color);
  cell.textContent = n.num;
  cell.onclick = ()=>{
    currentBet += 10;
    balance -=10;
    updateBetInfo();
    cell.style.boxShadow = "0 0 15px gold";
    setTimeout(()=>cell.style.boxShadow="",300);
  }
  tableEl.appendChild(cell);
});

// ---- UPDATE BET INFO ----
function updateBetInfo(){
  betInfo.textContent = `Balance: $${balance} | Current Bet: $${currentBet}`;
}

// ---- SPIN LOGIC ----
spinBtn.onclick = ()=>{
  if(currentBet===0) return alert("Place a bet first!");
  const winningIndex = Math.floor(Math.random()*numbers.length);
  const winningNumber = numbers[winningIndex];
  animateWheelSpin(winningIndex);
};

// ---- WHEEL ANIMATION ----
function animateWheelSpin(winIdx){
  let rotation = 0;
  const totalRot = 360*6 + (winIdx * (360/numbers.length));
  const duration = 4000;
  const start = performance.now();

  function spin(timestamp){
    let elapsed = timestamp - start;
    let progress = Math.min(elapsed/duration,1);
    wheel.style.transform = `rotate(${totalRot*progress}deg)`;
    ball.style.transform = `translateX(-50%) rotate(${360*6*progress}deg)`;
    if(progress<1){
      requestAnimationFrame(spin);
    } else {
      resolveSpin(numbers[winIdx]);
    }
  }
  requestAnimationFrame(spin);
}

// ---- RESOLVE WIN ----
function resolveSpin(winning){
  const betCells = Array.from(tableEl.children).filter(c=>c.style.boxShadow!=="");
  let won = false;
  betCells.forEach(cell=>{
    if(parseInt(cell.textContent)===winning.num){
      won = true;
      balance += currentBet*35;
      animationController.winParticles();
    }
  });
  if(!won) currentBet=0;
  else currentBet=0;
  updateBetInfo();
  localStorage.setItem(WALLET_KEY,balance);
  // clear bets
  Array.from(tableEl.children).forEach(c=>c.style.boxShadow="");
}
</script>
</body>
</html>
