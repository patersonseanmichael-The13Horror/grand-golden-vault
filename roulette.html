<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette — Golden Vault Ultra VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root{
  --gold:#d4af37;
  --text-light:#eae6dc;
  --bg-dark:#0b0704;
  --panel:#140e09;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
  background: radial-gradient(circle at top,#1c130a,#080503 70%);
  color:var(--text-light);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}
.vault{
  width:95%;max-width:900px;
  background:linear-gradient(180deg,#160f09,#0b0704);
  border:2px solid rgba(212,175,55,0.7);
  border-radius:18px;
  padding:20px;
  box-shadow:0 0 80px rgba(212,175,55,0.3), inset 0 0 30px rgba(0,0,0,0.6);
  text-align:center;
  position:relative;
  z-index:5;
}
h1{color:var(--gold);margin-bottom:10px;font-size:1.6rem;}
.balance{font-size:1.5rem;color:var(--gold);margin-bottom:15px;}
.grid{display:grid;grid-template-columns:repeat(3,50px);gap:2px;margin:15px auto;border:3px solid #d4af37;border-radius:6px;position:relative;}
.grid button{width:50px;height:50px;border-radius:4px;border:1px solid #d4af37;cursor:pointer;font-size:0.9rem;font-weight:bold;color:#fff;position:relative;}
.grid button.red{background:#c20a0a;}
.grid button.black{background:#111;}
.grid button.green{background:#007700;}
.grid button:hover{box-shadow:0 0 12px #ffd700;}
.chip{width:22px;height:22px;border-radius:50%;background:#d4af37;position:absolute;transform:translate(-50%,-50%) scale(0);box-shadow:0 0 12px #fff,0 0 6px inset #ffd700;transition:0.5s;}
.message{margin-top:12px;height:24px;font-weight:bold;font-size:1.1rem;}
.exit-btn{margin-top:15px;}
button.bet{padding:8px 14px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:0.3s;margin:2px;}
button.bet:hover{background:rgba(212,175,55,0.1);box-shadow:0 0 15px #ffd700;}
.wheel-container{position:relative;margin:20px auto;width:300px;height:300px;}
.wheel{width:100%;height:100%;border-radius:50%;border:5px solid var(--gold);position:relative;overflow:hidden;}
.wheel div{position:absolute;width:50%;height:50%;display:flex;align-items:flex-start;justify-content:center;font-size:0.65rem;color:#fff;}
.ball{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg);z-index:10;box-shadow:0 0 6px #fff,0 0 3px inset #ccc;}
</style>
</head>
<body>

<div class="vault" id="vault">
<h1>Roulette — Golden Vault VIP</h1>
<div class="balance" id="balance">$1000</div>

<div class="bets">
<button class="bet" onclick="selectBet('red')">Red</button>
<button class="bet" onclick="selectBet('black')">Black</button>
<button class="bet" onclick="selectBet('green')">0</button>
<button class="bet" onclick="selectBet('even')">Even</button>
<button class="bet" onclick="selectBet('odd')">Odd</button>
</div>

<div class="wheel-container">
  <div class="wheel" id="wheel"></div>
  <div class="ball" id="ball"></div>
</div>

<div class="grid" id="grid"></div>
<div class="message" id="message"></div>
<button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<script>
const grid=document.getElementById('grid');
const balanceEl=document.getElementById('balance');
const messageEl=document.getElementById('message');
const wheel=document.getElementById('wheel');
const ball=document.getElementById('ball');

let balance=parseInt(localStorage.getItem("goldenVaultBalance"))||1000;
balanceEl.textContent="$"+balance;

let selectedBets=[];
let redNumbers=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

// Build table numbers
for(let n=1;n<=36;n++){
  let btn=document.createElement('button');
  btn.textContent=n;
  btn.className=redNumbers.includes(n)?'red':'black';
  btn.onclick=()=>selectBet(n);
  grid.appendChild(btn);
}
let zeroBtn=document.createElement('button');
zeroBtn.textContent='0';
zeroBtn.className='green';
zeroBtn.onclick=()=>selectBet(0);
grid.insertBefore(zeroBtn, grid.firstChild);

function selectBet(choice){
  if(balance<50){messageEl.textContent="Not enough balance"; return;}
  balance-=50;
  balanceEl.textContent="$"+balance;
  selectedBets.push(choice);
  messageEl.textContent="Bet placed: "+choice;

  // Add chip visually
  let chip=document.createElement('div');
  chip.className='chip';
  chip.style.left=(typeof choice==='number'?((choice-1)%3)*50+25+'px'):'50%';
  chip.style.top=(typeof choice==='number'?Math.floor((choice-1)/3)*50+25+'px'):'20px';
  grid.appendChild(chip);
  setTimeout(()=>{chip.style.transform='translate(-50%,-50%) scale(1)';},50);

  setTimeout(spinWheel,500);
}

function spinWheel(){
  if(selectedBets.length===0) return;
  messageEl.textContent="Spinning...";
  
  let winningNumber=Math.floor(Math.random()*37);
  let color=winningNumber===0?'green':redNumbers.includes(winningNumber)?'red':'black';

  // Ball animation
  let spins=5 + Math.random()*5; // spins
  let deg=360*spins + (winningNumber/37)*360;
  ball.style.transition='transform 4s cubic-bezier(.25,.1,.25,1)';
  ball.style.transform=`translate(-50%,-50%) rotate(${deg}deg)`;

  setTimeout(()=>{
    // Check bets
    let won=false;
    selectedBets.forEach(b=>{
      if(b===winningNumber || b===color) won=true;
      if(b==='even' && winningNumber!==0 && winningNumber%2===0) won=true;
      if(b==='odd' && winningNumber%2===1) won=true;
    });

    let payout=won?100:selectedBets.length*50;
    if(won){balance+=payout; messageEl.textContent=`${winningNumber} ${color}! You win $${payout}`;}
    else{messageEl.textContent=`${winningNumber} ${color}! You lose`;}
    balanceEl.textContent="$"+balance;
    localStorage.setItem("goldenVaultBalance",balance);

    // Remove chips
    document.querySelectorAll('.chip').forEach(c=>c.remove());
    selectedBets=[];
    ball.style.transition='none';
    ball.style.transform='translate(-50%,-50%) rotate(0deg)';
  },4100);
}

function exitVault(){window.location.href="members.html";}
</script>
</body>
</html>
