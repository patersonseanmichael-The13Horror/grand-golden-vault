<!DOCTYPE html>
<html>
<head>
  <title>Golden Vault — Roulette</title>
  <link rel="stylesheet" href="/vault/vaultTheme.css">
</head>
<body>

<div class="vault-panel">
  <h2>Roulette Table</h2>

  <p><strong>Balance:</strong> <span id="balance"></span></p>

  <div style="margin:20px 0;">
    <button onclick="betRed()">Bet 50 GOLD on Red</button>
    <button onclick="betBlack()">Bet 50 GOLD on Black</button>
  </div>

  <p id="result">Place your bet.</p>

  <button onclick="exit()">Return to Lobby</button>
</div>

<script src="/vault/vaultRouter.js"></script>
<script src="/vault/vaultAuth.js"></script>
<script src="/vault/vaultEngine.js"></script>
<script src="/games/rouletteEngine.js"></script>

<script>
VaultAuth.enforce();

function renderBalance(){
  document.getElementById("balance").textContent =
    VaultEngine.getBalance() + " GOLD";
}

function betRed(){
  play("RED");
}

function betBlack(){
  play("BLACK");
}

function play(choice){
  try {
    const outcome = RouletteEngine.spin(50, choice);
    document.getElementById("result").textContent = outcome;
    renderBalance();
  } catch(e){
    alert(e.message);
  }
}

function exit(){
  VaultRouter.toLobby();
}

renderBalance();
</script>

</body>
</html>
