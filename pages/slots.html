<!DOCTYPE html>
<html>
<head>
  <title>Golden Vault — Slots</title>
  <link rel="stylesheet" href="/vault/vaultTheme.css">
</head>
<body>

<div class="vault-panel">
  <h2 id="machineTitle">Auric Serpent</h2>

<div style="margin-bottom:12px;">
  <button onclick="selectMachine('AURIC')">Auric Serpent</button>
  <button onclick="selectMachine('PROSPECTOR')">Gilded Prospector</button>
</div>

  <button onclick="spin()">Spin — 25 GOLD</button>

  <p id="result"></p>

  <button onclick="exit()">Return to Lobby</button>
</div>

<script src="/vault/vaultRouter.js"></script>
<script src="/vault/vaultAuth.js"></script>
<script src="/vault/vaultEngine.js"></script>
<script src="/games/slots/auricSerpent.js"></script>

<script>
VaultAuth.enforce();

let activeMachine = "AURIC";

function renderBalance(){
  document.getElementById("balance").textContent =
    VaultEngine.getBalance() + " GOLD";
}

function selectMachine(id){
  activeMachine = id;
  document.getElementById("machineTitle").textContent =
    id === "AURIC" ? "Auric Serpent" : "Gilded Prospector";
  document.getElementById("reels").innerHTML =
    "<div>—</div><div>—</div><div>—</div><div>—</div><div>—</div>";
  document.getElementById("result").textContent = "";
}

function spin(){
  try {
    const engine =
      activeMachine === "AURIC"
        ? AuricSerpent
        : GildedProspector;

    const outcome = engine.spin(25);

    document.getElementById("reels").innerHTML =
      outcome.reels.map(r=>`<div>${r}</div>`).join("");

    document.getElementById("result").textContent = outcome.message;
    renderBalance();
  } catch(e){
    alert(e.message);
  }
}

function exit(){
  VaultRouter.toLobby();
}

renderBalance();
</script>

</body>
</html>
