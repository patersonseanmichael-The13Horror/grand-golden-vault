<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Vault — Members Lobby</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="members.css">
</head>
<body>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- VAULT DOORS -->
<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="wallet">Wallet: 0 GOLD</div>
  <div class="vip">VIP: Gold</div>
</div>

<!-- VAULT LOBBY -->
<div class="vault" id="vault">
  <h1>Golden Vault — Casino Lobby</h1>

  <!-- Wallet & Ledger -->
  <div class="wallet-section">
    <h3>Member Info</h3>
    <p>ID: <span id="vaultId"></span></p>
    <p>Name: <span id="vaultName"></span></p>
    <p>Balance: <span id="vaultBalance"></span></p>
    <p>Tier: <span id="vaultTier"></span></p>
  </div>

  <div class="ledger-section">
    <h3>Ledger</h3>
    <div id="ledger"></div>
  </div>

  <!-- Game Cards -->
  <div class="game-cards">
    <div class="card" onclick="goToGame('blackjack.html')">🂡<br>Blackjack</div>
    <div class="card" onclick="goToGame('roulette.html')">🎰<br>Roulette</div>
    <div class="card" onclick="goToGame('poker.html')">🃏<br>Poker</div>
    <div class="card" onclick="openSlots()">🎰<br>Platinum Slots</div>
  </div>

  <!-- SLOTS SECTION -->
  <div id="slots-section">
    <div id="game-container"></div>
    <div id="ui-panel">
      <button id="spinBtn">Spin</button>
      <button id="autoSpinBtn">AutoSpin</button>
      <button id="doubleUpBtn">Double Up</button>
      <span>Balance: $<span id="balance">1000</span></span>
      <button onclick="closeSlots()" class="exit-slots-btn">Back to Vault</button>
    </div>
  </div>

  <!-- VIP Progress -->
  <div class="vip-section">
    <h3>VIP Progress</h3>
    <div class="vip-progress">
      <div class="vip-progress-inner" id="vipBar"></div>
    </div>
  </div>

  <!-- Live Feed -->
  <div class="live-feed" id="feedBox"></div>

  <!-- Exit Button -->
  <button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4bJmDnapnEFlGggYVIoq2lS3QwHHz4hE",
  authDomain: "grand-golden-vault.firebaseapp.com",
  projectId: "grand-golden-vault",
  storageBucket: "grand-golden-vault.firebasestorage.app",
  messagingSenderId: "969306014666",
  appId: "1:969306014666:web:228839a8b7f36e9b808533"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if(!user || !user.emailVerified){
    window.location.href = "login.html";
  }
});
</script>

<!-- MEMBERS JS -->
<script type="module" src="members.js"></script>

<!-- VAULT ANIMATION & PARTICLES -->
<script>
const doors = document.getElementById('doors');
const vault = document.getElementById('vault');
setTimeout(()=>doors.classList.add('open'),600);
setTimeout(()=>vault.classList.add('visible'),2000);

function exitVault(){
  vault.classList.remove('visible');
  setTimeout(()=>doors.classList.remove('open'),400);
  setTimeout(()=>signOut(getAuth()).then(()=>window.location.href="login.html"),2600);
}

function goToGame(url){
  vault.classList.remove('visible');
  setTimeout(()=>doors.classList.remove('open'),400);
  setTimeout(()=>window.location.href=url,2600);
}

// PARTICLES
const particlesContainer = document.getElementById('particles');
particlesContainer.innerHTML='';
for(let i=0;i<70;i++){
  const p=document.createElement('div');
  p.classList.add('particle');
  p.style.left=Math.random()*100+'vw';
  p.style.top=Math.random()*100+'vh';
  p.style.width=2+Math.random()*6+'px';
  p.style.height=p.style.width;
  p.style.animationDuration=(4+Math.random()*6)+'s';
  p.style.opacity=0.5+Math.random()*0.5;
  particlesContainer.appendChild(p);
}

// VIP BAR ANIMATION
const vipBar = document.getElementById('vipBar');
setTimeout(()=>vipBar.style.width='65%', 800);

// SLOTS SECTION HANDLERS
function openSlots(){
  document.querySelector('.game-cards').style.display='none';
  document.getElementById('slots-section').style.display='block';
  document.getElementById('slots-section').scrollIntoView({behavior:'smooth'});
  if(typeof initSlots==='function') initSlots();
}
function closeSlots(){
  document.getElementById('slots-section').style.display='none';
  document.querySelector('.game-cards').style.display='grid';
}
</script>

<!-- THREE.JS & GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r153/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js"></script>
<script type="module" src="slots.js"></script>

</body>
</html>
