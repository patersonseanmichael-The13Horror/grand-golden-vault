<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Vault — Members Lobby</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root {
  --gold: #d4af37;
  --text-light: #eae6dc;
  --bg-dark: #080503;
  --panel: #140e09;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
  background: radial-gradient(circle at top,#1c130a,#080503 70%);
  color: var(--text-light);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Vault Doors */
.doors{position:fixed;inset:0;z-index:10;display:flex;pointer-events:none;}
.door{width:50%;height:100%;
background:linear-gradient(180deg,#1a120a,#090603);
border-right:1px solid rgba(212,175,55,0.4);
box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
transform:translateX(0);transition: transform 2.6s cubic-bezier(.77,0,.18,1);}
.door.right{border-right:none;border-left:1px solid rgba(212,175,55,0.4);}
.doors.open .door.left{transform:translateX(-100%);}
.doors.open .door.right{transform:translateX(100%);}

/* Vault Lobby */
.vault{width:92%;max-width:500px;
background:linear-gradient(180deg,#160f09,#0b0704);
border:1px solid rgba(212,175,55,0.5);
border-radius:18px;padding:30px;
box-shadow:0 0 60px rgba(212,175,55,0.18),inset 0 0 30px rgba(0,0,0,0.6);
text-align:center;
opacity:0;transform:scale(0.96);transition:opacity 1.2s ease, transform 1.2s ease;}
.vault.visible{opacity:1;transform:scale(1);}

h1{color:var(--gold);margin-bottom:20px;}

.game-buttons{display:flex;flex-direction:column;gap:15px;}
button{padding:14px 24px;border-radius:12px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:0.3s;font-size:1rem;}
button:hover{background:rgba(212,175,55,0.1);box-shadow:0 0 12px rgba(212,175,55,0.3);}
.exit-btn{margin-top:20px;}
</style>
</head>
<body>

<!-- Vault Doors -->
<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<!-- Vault Lobby -->
<div class="vault" id="vault">
<h1>Golden Vault — Casino Lobby</h1>

<div class="game-buttons">
  <button onclick="goToGame('blackjack.html')">🂡 Blackjack</button>
  <button onclick="goToGame('roulette.html')">🎰 Roulette</button>
  <button onclick="goToGame('poker.html')">🃏 Poker</button>
</div>

<button class="exit-btn" onclick="exitVault()">Exit Vault</button>
</div>

<!-- Firebase Auth Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA4bJmDnapnEFlGggYVIoq2lS3QwHHz4hE",
    authDomain: "grand-golden-vault.firebaseapp.com",
    projectId: "grand-golden-vault",
    storageBucket: "grand-golden-vault.firebasestorage.app",
    messagingSenderId: "969306014666",
    appId: "1:969306014666:web:228839a8b7f36e9b808533"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔐 Protect members area
  onAuthStateChanged(auth, (user) => {
    if(!user || !user.emailVerified){
      // Not logged in or email not verified → redirect to login
      window.location.href = "login.html";
    }
  });
</script>

<script>
const doors=document.getElementById('doors');
const vault=document.getElementById('vault');

// Open vault doors on load
setTimeout(()=>doors.classList.add('open'),600);
setTimeout(()=>vault.classList.add('visible'),2000);

// Exit vault
function exitVault(){
  vault.classList.remove('visible');
  setTimeout(()=>doors.classList.remove('open'),400);
  setTimeout(()=>{
    signOut(auth).then(()=>window.location.href="login.html");
  },2600);
}

// Navigate to game with doors animation
function goToGame(url){
  vault.classList.remove('visible');
  setTimeout(()=>doors.classList.remove('open'),400);
  setTimeout(()=>window.location.href=url,2600);
}
</script>
</body>
</html>
