<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Members Vault — Grand Golden Vault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="vault-page">

  <header class="topbar">
    <div class="logo">GRAND GOLDEN VAULT</div>
    <nav class="vault-nav">
      <a href="index.html">Home</a>
      <a href="casino.html">Casino</a>
      <a href="about.html">Legacy</a>
      <a href="members.html">Members</a>
    </nav>
  </header>

  <div class="vault-lock" id="vaultLock">
    <h2>Enter the Vault</h2>
    <input type="password" id="vaultPassword" placeholder="Vault Key" />
    <button id="unlockBtn">Unlock</button>
    <p class="vault-msg" id="vaultMsg"></p>
  </div>

  <div class="vault-content" id="vaultContent" style="display:none;">
    <section class="legacy-hero">
      <h1>Welcome, Member</h1>
      <p>You now have access to the inner sanctum of the Grand Golden Vault.</p>
    </section>

    <section class="tables">
      <div class="table-card">
        <h3>Private Baccarat Room</h3>
        <span>High Stakes · Invitation Only</span>
      </div>

      <div class="table-card">
        <h3>Vault Roulette</h3>
        <span>Single Zero · Elite Table</span>
      </div>

      <div class="table-card">
        <h3>Exclusive Blackjack</h3>
        <span>Hand-Shuffled · Private Deck</span>
      </div>
    </section>
  </div>

  <script>
    const vaultKey = "GOLDENVAULT"; // 🔑 reference code
    const unlockBtn = document.getElementById("unlockBtn");
    const vaultPassword = document.getElementById("vaultPassword");
    const vaultContent = document.getElementById("vaultContent");
    const vaultLock = document.getElementById("vaultLock");
    const vaultMsg = document.getElementById("vaultMsg");

    unlockBtn.addEventListener("click", () => {
      if(vaultPassword.value === vaultKey){
        vaultLock.style.display = "none";
        vaultContent.style.display = "block";
      } else
      <div class="member-feed" id="memberFeed">
  <span class="feed-text">Initializing Vault Transactions...</span>
</div> {
        vaultMsg.textContent = "Invalid key. Try again.";
        vaultMsg.style.color = "#d4af37";
      }
      vaultPassword.value = "";
    });

    vaultPassword.addEventListener("keypress", (e) => {
      if(e.key === "Enter") unlockBtn.click();
    });
  </script>

</body>
</html>
