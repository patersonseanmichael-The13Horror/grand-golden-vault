<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Members Vault — GOLDENVAULT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="vault-page">

<!-- TOP BAR -->
<header class="topbar">
  <div class="logo">GOLDENVAULT</div>
  <nav class="vault-nav">
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
</header>

<!-- MEMBERS VAULT -->
<section class="landing-hero" style="background:url('images/bull-gold.jpg') center/cover no-repeat;">
  <h1>Members Vault</h1>
  <p>
    Beyond these doors lies wealth, discipline, and legacy.  
    The Bull watches. The Vault remembers.
  </p>
</section>

<!-- VAULT LOCK AREA -->
<section class="vault-lock">
  <h2>Vault Access Granted</h2>
  <p class="vault-msg">Your presence has been logged in the ledger.</p>
</section>

<!-- LIVE FEED -->
<div class="member-feed" id="feedBox"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyWGltBo7tZgZydGkaZwmKW2WzkOpwWn4",
    authDomain: "goldenvault-65fe2.firebaseapp.com",
    projectId: "goldenvault-65fe2",
    storageBucket: "goldenvault-65fe2.appspot.com",
    messagingSenderId: "825820839145",
    appId: "1:825820839145:web:7a04520086290010510478",
    measurementId: "G-Z2VCVP4CKH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔐 Protect page
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  // 🚪 Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  });
</script>

<!-- LIVE FAKE FEED SCRIPT -->
<script>
  const feedBox = document.getElementById("feedBox");

  const actions = ["Deposit", "Withdrawal"];
  const amounts = ["$250", "$500", "$1,200", "$5,000", "$12,000"];
  
  function randomPhone() {
    return "04******" + Math.floor(10 + Math.random() * 89);
  }

  function addFeedItem() {
    const action = actions[Math.floor(Math.random() * actions.length)];
    const amount = amounts[Math.floor(Math.random() * amounts.length)];
    const time = new Date().toLocaleTimeString();

    const div = document.createElement("div");
    div.textContent = `${action} | ${amount} | ${randomPhone()} | ${time}`;
    div.style.marginBottom = "6px";
    div.style.color = action === "Deposit" ? "#d4af37" : "#e5c55a";

    feedBox.prepend(div);

    if (feedBox.children.length > 6) {
      feedBox.removeChild(feedBox.lastChild);
    }
  }

  setInterval(addFeedItem, 3500);
</script>

</body>
</html>
