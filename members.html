<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Members Vault — GOLDENVAULT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="vault-page">

<!-- TOP BAR -->
<header class="topbar">
  <div class="logo">GOLDENVAULT</div>
  <nav class="vault-nav">
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
</header>

<!-- MEMBERS VAULT HERO -->
<section class="landing-hero" style="background:url('images/bull-gold.jpg') center/cover no-repeat;">
  <h1>Members Vault</h1>
  <p>
    Beyond these doors lies wealth, discipline, and legacy.  
    The Bull watches. The Vault remembers.
  </p>
</section>

<!-- WALLET INFO -->
<section class="vault-wallet">
  <div>Vault ID: <span id="vaultId"></span></div>
  <div>Name: <span id="vaultName"></span></div>
  <div>Balance: <span id="vaultBalance"></span></div>
  <div>Tier: <span id="vaultTier"></span></div>
</section>

<!-- DEPOSIT BUTTONS -->
<section class="vault-deposit">
  <h3>Deposit GOLD</h3>
  <button onclick="deposit(50)">Deposit 50 GOLD</button>
  <button onclick="deposit(100)">Deposit 100 GOLD</button>
</section>

<!-- LEDGER HISTORY -->
<section class="vault-ledger">
  <h3>Ledger History</h3>
  <div id="ledger"></div>
</section>

<!-- LIVE FAKE FEED -->
<div class="member-feed" id="feedBox"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "REDACTED_FOR_SAFETY",
    authDomain: "goldenvault-65fe2.firebaseapp.com",
    projectId: "goldenvault-65fe2",
    storageBucket: "goldenvault-65fe2.appspot.com",
    messagingSenderId: "825820839145",
    appId: "1:825820839145:web:7a04520086290010510478",
    measurementId: "G-Z2VCVP4CKH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Protect page
  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "login.html";
  });

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => window.location.href = "login.html");
  });
</script>

<!-- MEMBERS JS -->
<script src="members.js"></script>

</body>
</html>
