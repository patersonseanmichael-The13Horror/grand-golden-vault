<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Vault — Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="members.css">
</head>
<body class="vault-page">

<div class="vault">
  <h1>Golden Vault — Wallet</h1>

  <div class="wallet-section">
    <h3>Member Wallet</h3>
    <p>ID: <span id="walletId"></span></p>
    <p>Name: <span id="walletName"></span></p>
    <p>Balance: <span id="walletBalance"></span></p>
    <p>Tier: <span id="walletTier"></span></p>
  </div>

  <div class="deposit-section">
    <h3>Deposit GOLD</h3>
    <input type="number" id="depositAmount" placeholder="Enter amount" min="1"/>
    <input type="text" id="depositDesc" placeholder="Description (optional)"/>
    <button id="depositBtn">Deposit</button>
  </div>

  <div class="ledger-section">
    <h3>Ledger</h3>
    <div id="ledger"></div>
  </div>

  <button id="backVaultBtn">Back to Vault</button>
</div>

<script type="module" src="wallet.js"></script>
</body>
</html>
