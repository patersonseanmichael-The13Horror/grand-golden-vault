<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golden Vault</title>
  <link rel="stylesheet" href="vault/vaultTheme.css">
  <style>
    .splash{min-height:100vh;display:grid;place-items:center;padding:26px;background:transparent}
    .card{width:min(820px,100%);border:1px solid var(--border-gold);background:rgba(18,12,8,.74);border-radius:18px;padding:26px;box-shadow:0 18px 70px rgba(0,0,0,.65)}
    h1{margin:0;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-size:1.1rem}
    p{margin:12px 0 0;opacity:.82;line-height:1.45;max-width:60ch}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .btn{border:1px solid var(--border-gold);background:rgba(18,12,8,.55);color:var(--text-light);padding:12px 14px;border-radius:12px;cursor:pointer}
    .btn.primary{border-color:var(--gold);background:var(--gold);color:#000;font-weight:800}
  </style>

  <style>
    :root{ --vault-bg-image: url('images/vault-door-path.jpg'); --vault-bg-dim: 0.55; }
  </style>

</head>
<body class="vault-bg">
<div class="vault-vignette"></div>
  <div class="splash">
    <div class="card">
      <h1>Golden Vault</h1>
      <p>Private, elegant, and deliberately minimal. Enter to access the Members Index and the Vault-controlled floor.</p>
      <div class="row">
        <button class="btn primary" onclick="enter()">Enter</button>
        <button class="btn" onclick="reset()">Reset Local Vault</button>
      </div>
      <p style="margin-top:14px;font-size:.85rem;opacity:.65">For Firebase login, configure <code>vault/firebaseConfig.js</code>.</p>
    </div>
  </div>

  <script src="vault/vaultRouter.js"></script>
  <script src="vault/vaultAuth.js"></script>
  <script src="vault/vaultEngine.js"></script>

  <script>
    function enter(){
      try{
        if (window.VaultAuth && VaultAuth.isValid && VaultAuth.isValid()) VaultRouter.toLobby();
        else VaultRouter.toLogin();
      }catch(_){
        window.location.href = "pages/login.html";
      }
    }
    function reset(){
      if (confirm("Reset local vault storage?")) {
        try { VaultEngine.resetVault(); } catch(_) {}
        localStorage.removeItem("GV_SESSION");
        alert("Reset complete.");
      }
    }
  </script>
</body>
</html>
