<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Golden Vault Access</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="vault-bg">

  <div class="vault-container">

    <!-- LOGIN -->
    <form id="loginForm" class="vault-box">
      <h2>Enter the Vault</h2>
      <input id="loginPhone" placeholder="Vault ID" required>
      <input id="loginPassword" type="password" placeholder="Vault Key" required>
      <button type="submit">Unlock</button>
      <p id="loginMessage" class="error"></p>
    </form>

    <!-- SIGN UP -->
    <form id="signupForm" class="vault-box">
      <h2>Forge a Vault</h2>
      <input id="signupPhone" placeholder="Create Vault ID" required>
      <input id="signupPassword" type="password" placeholder="Create Key" required>
      <input id="signupConfirmPassword" type="password" placeholder="Confirm Key" required>
      <button type="submit">Seal Vault</button>
      <p id="signupMessage" class="error"></p>
    </form>

  </div>

  <!-- 🔥 MODULE SCRIPTS -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="login.js"></script>
  <script type="module" src="signup.js"></script>

</body>
</html>
