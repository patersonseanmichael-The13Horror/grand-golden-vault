<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Golden Vault Access</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <form id="loginForm">
    <input id="loginPhone" placeholder="Vault ID" required>
    <input id="loginPassword" type="password" placeholder="Key" required>
    <button type="submit">Enter Vault</button>
    <p id="loginMessage"></p>
  </form>

  <!-- SIGN UP -->
  <form id="signupForm">
    <input id="signupPhone" placeholder="Create Vault ID" required>
    <input id="signupPassword" type="password" placeholder="Create Key" required>
    <input id="signupConfirmPassword" type="password" placeholder="Confirm Key" required>
    <button type="submit">Forge Vault</button>
    <p id="signupMessage"></p>
  </form>

  <!-- 🚨 MODULE SCRIPTS (ORDER MATTERS) -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="login.js"></script>
  <script type="module" src="signup.js"></script>

</body>
</html>
