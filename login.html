<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="firebase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grand Golden Vault Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="vault-page">

<section class="login-section">

  <!-- GOLD DUST PARTICLES -->
  <div id="loginParticles"></div>

  <!-- LOGIN + SIGN-UP CONTAINER -->
  <div class="login-container">

    <!-- LOGIN BOX -->
    <div class="login-box">
      <h2>Member Login</h2>
      <form id="loginForm">
      <input type="email" id="email">
<input type="password" id="password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
      </form>
      <p id="loginMessage"></p>
      <p>Don't have access? <a href="#signupBox" onclick="scrollToSignup()">Request Access</a></p>
    </div>

    <!-- SIGN-UP BOX -->
    <div class="signup-box" id="signupBox">
      <h2>Sign-Up</h2>
      <p class="signup-story">
        Join the vault and claim your place alongside the legendary bull. Begin your journey from nothing to greatness.
      </p>
      <form id="signupForm">
    <input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
      </form>
      <p id="signupMessage"></p>
    </div>

  </div>
</section>



<script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "BIBjRmHY5_QfdsiqtN2iw3u3s0pog9t6x0ibeH9nbGs4Dnv8JvsVJig1_rYTD7a4WoA86sewTRABj8mgaum7SoM",
    authDomain: "grand-golden-vault.firebaseapp.com",
    projectId: "grand-golden-vault",
    storageBucket: "grand-golden-vault.firebasestorage.app",
    messagingSenderId: "969306014666",
    appId: "1:969306014666:web:228839a8b7f36e9b808533"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // SIGN UP
  window.signup = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        alert("Account created. Welcome to Golden Vault.");
        window.location.href = "members.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  };

  // LOGIN
  window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        alert("Welcome back.");
        window.location.href = "members.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  };
  
  // GOLD DUST PARTICLES
  const particleContainer = document.getElementById('loginParticles');
  for(let i=0; i<40; i++){
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random()*100 + 'vw';
    p.style.top = Math.random()*100 + 'vh';
    p.style.width = p.style.height = (Math.random()*3 + 2) + 'px';
    particleContainer.appendChild(p);
  }

  // Scroll helper
  function scrollToSignup() {
    document.getElementById('signupBox').scrollIntoView({behavior: "smooth"});
  }
  
<script type="module" src="login.js"></script>

</body>
</html>
