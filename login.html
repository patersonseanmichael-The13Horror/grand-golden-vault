<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grand Golden Vault</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAyWGltBo7tZgZydGkaZwmKW2WzkOpwWn4",
      authDomain: "goldenvault-65fe2.firebaseapp.com",
      projectId: "goldenvault-65fe2",
      storageBucket: "goldenvault-65fe2.appspot.com",
      messagingSenderId: "825820839145",
      appId: "1:825820839145:web:7a04520086290010510478"
    };
    const app = initializeApp(firebaseConfig);
    window.auth = getAuth(app); // expose globally for JS files
  </script>
</head>
<body class="vault-page">

<section class="login-section">
  <!-- GOLD DUST PARTICLES -->
  <div id="loginParticles"></div>

  <!-- LOGIN + SIGN-UP BOXES -->
  <div class="login-container">

    <!-- LOGIN BOX -->
    <div class="login-box">
      <h2>Member Login</h2>
      <form id="loginForm">
        <input type="tel" id="loginPhone" placeholder="Mobile Number" required>
        <input type="password" id="loginPassword" placeholder="Vault Key" required>
        <button type="submit">Login</button>
      </form>
      <p id="loginMessage"></p>
      <p>Don't have access? <a href="#signupBox" onclick="scrollToSignup()">Request Access</a></p>
    </div>

    <!-- SIGN-UP BOX -->
    <div class="signup-box" id="signupBox">
      <h2>Sign-Up</h2>
      <p class="signup-story">
        Join the vault and claim your place alongside the legendary bull. Begin your journey from nothing to greatness.
      </p>
      <form id="signupForm">
        <input type="text" id="signupName" placeholder="Full Name" required>
        <input type="tel" id="signupPhone" placeholder="Mobile Number" required>
        <input type="date" id="signupDob" required>
        <input type="password" id="signupPassword" placeholder="Vault Key" required>
        <input type="password" id="signupConfirmPassword" placeholder="Confirm Vault Key" required>
        <button type="submit">Submit Request</button>
      </form>
      <p id="signupMessage"></p>
    </div>

  </div>
</section>

<!-- Scripts -->
<script src="signup.js" type="module"></script>
<script src="login.js" type="module"></script>

<script>
  // GOLD DUST PARTICLES
  const particleContainer = document.getElementById('loginParticles');
  for(let i=0;i<40;i++){
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random()*100 + 'vw';
    p.style.top = Math.random()*100 + 'vh';
    p.style.width = p.style.height = (Math.random()*3 + 2) + 'px';
    particleContainer.appendChild(p);
  }

  // Scroll helper
  function scrollToSignup(){
    document.getElementById('signupBox').scrollIntoView({behavior:"smooth"});
  }
</script>

</body>
</html>
