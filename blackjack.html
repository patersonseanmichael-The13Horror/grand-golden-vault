<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blackjack — Golden Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    :root {
      --gold: #d4af37;
      --text-light: #eae6dc;
      --panel: #140e09;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif;}
    body{
      background:radial-gradient(circle at top,#1c130a,#080503 70%);
      color:var(--text-light);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .doors{position:fixed;inset:0;display:flex;z-index:10;pointer-events:none}
    .door{width:50%;background:#120c08;transition:2.6s cubic-bezier(.77,0,.18,1)}
    .doors.open .left{transform:translateX(-100%)}
    .doors.open .right{transform:translateX(100%)}
    .vault{
      background:#0b0704;
      border:1px solid rgba(212,175,55,.5);
      border-radius:18px;
      padding:30px;
      width:92%;max-width:500px;
      text-align:center;
      opacity:0;transform:scale(.95);
      transition:1.2s;
      position:relative;
    }
    .vault.visible{opacity:1;transform:scale(1)}
    h1{color:var(--gold)}
    .balance{color:var(--gold);font-size:1.5rem;margin:10px}
    .table{background:var(--panel);padding:20px;border-radius:12px;position:relative}
    .cards{display:flex;justify-content:center;gap:12px;margin:10px}
    .card{
      width:60px;height:90px;
      background:#fff;color:#000;
      display:flex;align-items:center;justify-content:center;
      border-radius:6px;font-weight:bold;
    }
    button{
      padding:10px 16px;
      border:1px solid var(--gold);
      background:transparent;color:var(--gold);
      border-radius:8px;cursor:pointer;
    }
    .buttons,.bet-container{display:flex;justify-content:center;gap:10px;margin-top:10px}
    .message{height:24px;margin-top:10px;color:var(--gold);}
  </style>
</head>
<body>

<div class="doors" id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<div class="vault" id="vault">
  <h1>Blackjack — Golden Vault</h1>
  <div class="balance" id="balance">$0</div>

  <div class="table">
    <div>Dealer</div>
    <div class="cards" id="dealer-cards"></div>

    <div>Player</div>
    <div class="cards" id="player-cards"></div>

    <div class="bet-container">
      <button onclick="setBet(10)">$10</button>
      <button onclick="setBet(25)">$25</button>
      <button onclick="setBet(50)">$50</button>
      <button onclick="setBet(100)">$100</button>
    </div>

    <div class="buttons">
      <button onclick="hit()">Hit</button>
      <button onclick="stand()">Stand</button>
      <button onclick="doubleDown()">Double</button>
    </div>

    <div class="message" id="message"></div>
  </div>
</div>

<script type="module" src="../ui/pageController.js"></script>

</body>
</html>
