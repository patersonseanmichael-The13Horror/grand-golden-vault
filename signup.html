<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up — GOLDENVAULT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="vault-page">

<header class="topbar">
  <div class="logo">GOLDENVAULT</div>
</header>

<section class="landing-hero" style="background:url('images/bull-gold.jpg') center/cover no-repeat;">
  <h1>Create Your Vault Account</h1>
  <p>Join the Grand Golden Vault. Your legacy begins now.</p>
</section>

<section class="vault-wallet">
  <form id="signupForm">
    <input type="email" name="email" placeholder="Email" required style="width:100%; padding:10px; margin:10px 0; border-radius:6px;">
    <input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin:10px 0; border-radius:6px;">
    <button type="submit" style="width:100%; padding:12px; background:#d4af37; border:none; border-radius:8px; cursor:pointer; font-weight:bold; color:#1b1b1b;">Sign Up</button>
  </form>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "REDACTED_FOR_SAFETY",
    authDomain: "goldenvault-65fe2.firebaseapp.com",
    projectId: "goldenvault-65fe2",
    storageBucket: "goldenvault-65fe2.appspot.com",
    messagingSenderId: "825820839145",
    appId: "1:825820839145:web:7a04520086290010510478",
    measurementId: "G-Z2VCVP4CKH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // --- Redirect already logged-in users ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "members.html";
    }
  });

  // --- Signup form logic ---
  const signupForm = document.getElementById("signupForm");
  signupForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const email = signupForm.email.value;
    const password = signupForm.password.value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // ✅ Successful signup
        console.log("Signed up:", userCredential.user);

        // Redirect to Members Vault
        window.location.href = "members.html";
      })
      .catch((error) => {
        console.error(error.code, error.message);
        alert(error.message);
      });
  });
</script>

</body>
</html>
