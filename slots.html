<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Platinum Vegas Lounge Slots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #080503, #120c08);
  font-family: 'Inter', sans-serif;
  color: #eae6dc;
}
#game-container {
  width: 100vw;
  height: 100vh;
  position: relative;
}
#ui-panel {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  background: rgba(0,0,0,0.4);
  padding: 15px 25px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  z-index: 10;
}
button {
  background: #d4af37;
  color: #080503;
  border: none;
  padding: 10px 20px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s all;
}
button:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div id="game-container"></div>
<div id="ui-panel">
  <button id="spinBtn">Spin</button>
  <button id="autoSpinBtn">AutoSpin</button>
  <button id="doubleUpBtn">Double Up</button>
  <span>Balance: $<span id="balance">1000</span></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r153/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js"></script>
<script src="slots.js"></script>
</body>
</html>
